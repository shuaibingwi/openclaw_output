<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#1f2937} .title{font-size:30px;font-weight:700}.h{font-size:22px;font-weight:700}.t{font-size:18px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:18;ry:18}.core{fill:#dbeafe}.ctrl{fill:#dcfce7}.io{fill:#fef3c7}.power{fill:#fee2e2}.soft{fill:#ede9fe}.line{stroke:#475569;stroke-width:3;marker-end:url(#a)}</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<text x="60" y="60" class="title">B100（Orin）矢量架构图</text>
<rect x="90" y="110" width="1220" height="680" class="box" fill="#ffffff"/>
<rect x="180" y="180" width="300" height="140" class="box soft"/><text x="235" y="230" class="h">软件栈</text><text x="205" y="270" class="t">JetPack / L4T / CUDA / TensorRT</text>
<rect x="560" y="180" width="300" height="140" class="box" fill="#ecfeff"/><text x="625" y="230" class="h">存储与配置</text><text x="630" y="270" class="t">QSPI / EMMC / 本地存储</text>
<rect x="940" y="180" width="250" height="140" class="box power"/><text x="985" y="230" class="h">电源管理</text><text x="965" y="270" class="t">多电源域 / PG-EN / 复位控制</text>
<rect x="180" y="470" width="300" height="140" class="box core"/><text x="240" y="520" class="h">Orin 主计算单元</text><text x="220" y="560" class="t">AI推理 / 图像处理 / 应用运行</text>
<rect x="560" y="470" width="300" height="140" class="box ctrl"/><text x="610" y="520" class="h">Z7 / FPGA 协同单元</text><text x="590" y="560" class="t">时序控制 / 接口逻辑 / 配置管理</text>
<rect x="940" y="470" width="250" height="140" class="box io"/><text x="1000" y="520" class="h">高速接口</text><text x="980" y="560" class="t">网口 / PCIe / 调试接口</text>
<line x1="480" y1="250" x2="560" y2="250" class="line"/><line x1="860" y1="250" x2="940" y2="250" class="line"/>
<line x1="330" y1="320" x2="330" y2="470" class="line"/><line x1="710" y1="320" x2="710" y2="470" class="line"/><line x1="1065" y1="320" x2="1065" y2="470" class="line"/>
<line x1="480" y1="540" x2="560" y2="540" class="line"/><line x1="860" y1="540" x2="940" y2="540" class="line"/>
<text x="180" y="700" class="t">说明：B100采用 Orin + Z7/FPGA 协同架构，面向星载智能处理、SAR处理与边缘AI任务。</text>
</svg>
