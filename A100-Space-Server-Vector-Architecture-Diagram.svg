<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#1f2937} .title{font-size:30px;font-weight:700}.h{font-size:22px;font-weight:700}.t{font-size:18px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:18;ry:18}.srv{fill:#dbeafe}.net{fill:#dcfce7}.svc{fill:#ede9fe}.io{fill:#fef3c7}.hw{fill:#eef2ff}.line{stroke:#475569;stroke-width:3;marker-end:url(#a)}</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<text x="60" y="60" class="title">太空服务器（A100）矢量架构图</text>
<rect x="90" y="110" width="1220" height="680" class="box" fill="#ffffff"/>
<rect x="250" y="180" width="330" height="150" class="box svc"/><text x="330" y="235" class="h">软件与服务层</text><text x="285" y="275" class="t">PaaS / SaaS / Docker / SSH</text>
<rect x="720" y="180" width="330" height="150" class="box net"/><text x="790" y="235" class="h">组网与平台层</text><text x="760" y="275" class="t">星间链路 / 地面站 / 云原生卫星</text>
<rect x="150" y="420" width="980" height="240" class="box hw"/><text x="180" y="460" class="h">硬件层</text>
<rect x="190" y="490" width="240" height="120" class="box srv"/><text x="270" y="535" class="h">A机</text><text x="220" y="570" class="t">飞腾D2000 + GPU</text><text x="215" y="600" class="t">业务计算 / 服务承载</text>
<rect x="470" y="490" width="240" height="120" class="box srv"/><text x="550" y="535" class="h">B机</text><text x="500" y="570" class="t">飞腾D2000 + GPU</text><text x="495" y="600" class="t">协同 / 冗余 / 并行处理</text>
<rect x="750" y="490" width="330" height="120" class="box io"/><text x="850" y="535" class="h">接口与供电</text><text x="790" y="570" class="t">30V / 5A，串口，2个网口</text><text x="800" y="600" class="t">IDS / 上位机接口设计</text>
<line x1="580" y1="255" x2="720" y2="255" class="line"/>
<line x1="360" y1="330" x2="310" y2="420" class="line"/><line x1="470" y1="330" x2="610" y2="420" class="line"/><line x1="900" y1="330" x2="980" y2="420" class="line"/>
<line x1="430" y1="550" x2="470" y2="550" class="line"/><line x1="710" y1="550" x2="750" y2="550" class="line"/>
<text x="180" y="720" class="t">说明：太空服务器采用双机结构，面向在轨算力、云原生卫星和边缘智能应用承载。</text>
</svg>
